name: Daily Update (22f3000632@ds.study.iitm.ac.in)

on:
  schedule:
    - cron: '0 22 * * *'  # 10 PM UTC daily
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update timestamp by RANI (22f3000632@ds.study.iitm.ac.in)
        run: |
          echo "# Daily Update - $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> UPDATES.md

      - name: Commit changes
        run: |
          git config user.name "DevSync Bot"
          git config user.email "22f3000632@ds.study.iitm.ac.in"
          git add UPDATES.md
          git commit -m "Daily update: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" || exit 0
          git push
