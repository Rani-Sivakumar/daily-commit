name: Daily Update (22f3000632@ds.study.iitm.ac.in)

on:
  schedule:
    - cron: '0 22 * * *'  # Runs daily at 22:00 UTC (10 PM UTC, adjust if needed)
  workflow_dispatch:      # Lets you test manually right away

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update timestamp by RANI (22f3000632@ds.study.iitm.ac.in)
        run: |
          echo "$(date -u) - Daily automated update" >> README.md

      - name: Commit changes
        run: |
          git config user.name "DevSync Bot"
          git config user.email "22f3000632@ds.study.iitm.ac.in"
          git add README.md
          git commit -m "Daily update: $(date -u)" || exit 0
          git push
